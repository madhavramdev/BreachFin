<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Arsenal | Blueprint</title>
    <!-- Modern Fonts: Inter for UI, Fira Code for code blocks -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Background overlay elements -->
    <div class="hud-lines"></div>

    <div class="app-container">
        <!-- Sidebar: Global Targets -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">CYBER<span>ARSENAL</span><span class="cursor-blink">_</span></h1>
                <p class="subtitle">[ SYSTEM_CORE_V1.0x ]</p>
                <div class="header-divider"></div>
            </div>
            
            <div class="global-state-panel">
                <h2 class="panel-title">/// Global_Variables</h2>
                
                <div class="input-group">
                    <label for="target_ip">Target IP <span class="bracket">]</span></label>
                    <div class="input-wrapper">
                        <span class="prompt-arrow">&gt;_</span>
                        <input type="text" id="target_ip" placeholder="10.10.10.5" />
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="interface">Interface <span class="bracket">]</span></label>
                    <div class="input-wrapper">
                        <span class="prompt-arrow">&gt;_</span>
                        <input type="text" id="interface" placeholder="eth0 / tun0 / wlan0" />
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="target_port">Target Port <span class="bracket">]</span></label>
                    <div class="input-wrapper">
                        <span class="prompt-arrow">&gt;_</span>
                        <input type="text" id="target_port" placeholder="80" />
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="local_ip">Local IP (LHOST) <span class="bracket">]</span></label>
                    <div class="input-wrapper">
                        <span class="prompt-arrow">&gt;_</span>
                        <input type="text" id="local_ip" placeholder="10.10.14.8" />
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="wordlist">Wordlist Path <span class="bracket">]</span></label>
                    <div class="input-wrapper">
                        <span class="prompt-arrow">&gt;_</span>
                        <input type="text" id="wordlist" placeholder="/usr/share/wordlists/rockyou.txt" />
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="username">Target Username <span class="bracket">]</span></label>
                    <div class="input-wrapper">
                        <span class="prompt-arrow">&gt;_</span>
                        <input type="text" id="username" placeholder="admin" />
                    </div>
                </div>
                
                <button id="reset-state" class="btn-outline">[ INIT_PURGE ]</button>
            </div>
        </aside>

        <!-- Main Content: Tool Arsenal -->
        <main class="main-content">
            <header class="main-header">
                <div class="search-container">
                    <span class="search-prompt">QUERY&gt;</span>
                    <input type="text" id="search-tools" placeholder="Enter keywords..." />
                </div>
            </header>
            
            <div class="arsenal-container" id="arsenal-container">
                <!-- Dynamically populated by JS -->
                <div class="loading-state" style="font-family: var(--font-code); color: var(--matrix-primary);">
                    [!] FETCHING_MODULES...
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
